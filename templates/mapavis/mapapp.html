<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="initial-scale=1.0, user-scalable=no" />
<style type="text/css">
html { height: 100% }
body { height: 100%; margin: 0; padding: 0 }
#map_canvas { height: 100% }
</style>
<script type="text/javascript"
src="https://maps.googleapis.com/maps/api/js?key={{ GMAPS_API_KEY }}&sensor=false">
</script>
<script type="text/javascript">
var map;
function initialize() {
  var myLatlng = new google.maps.LatLng(58.3985303,15.5745319);
  var mapOptions = {
    zoom: 16,
    center: myLatlng,
    mapTypeId: google.maps.MapTypeId.ROADMAP
  }
  map = new google.maps.Map(document.getElementById("map_canvas"), mapOptions);

  google.maps.event.addListener(map, 'click', function(event) {
    createMarker(event.latLng);
  });
  //displayMarkers(map);
  displayRoads(map);
}

function createMarker(map, location, title) {
  var marker = new google.maps.Marker({
    position: location,
    map: map,
    title: title
  });
}

function displayMarkers(map) {
  {% for coord in COORDS %}
    createMarker(map, new google.maps.LatLng({{coord.lat}},{{coord.lng}}),"" + {{coord.id}});
  {% endfor %}
}

function createPolyline(map, path) {
  var polyline = new google.maps.Polyline({
    path: path,
    map: map
  });
}

function displayRoads(map) {
  {% for road in ROADS %}
    var points = new google.maps.MVCArray();
  {% for coord in road.coords %}
    points.push(new google.maps.LatLng({{coord.lat}}, {{coord.lng}}));
  {% endfor %}
  createPolyline(map, points);
  {% endfor %}
}

google.maps.event.addDomListener(window, 'load', initialize);
</script>
</head>
<body onload="initialize()">
<div id="map_canvas" style="width:100%; height:100%"></div>
<div id="coord_form" style="text-align:center; bottom:0px; posiion:fixed;">
  <form>
    start lng: <input type="" >
		start lat: <input type="" >
		dest lng: <input type="" >
		dest lat: <input type="" >
		<input type="submit" value="Compute shortest path">
	</form>
</div> 
</body>
</html>
